
# Configure a default setup of Home Assistant (frontend, api, etc)
# Includes: mobile_app, discovery, cloud, webhook, shopping_list, python_script
default_config:

frontend:
  themes: !include themes.yaml

# Uncomment this if you are using SSL/TLS, running in Docker container, etc.
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1
    - ::1
    - 172.16.0.0/12  # Docker networks (covers all 172.16-31.x.x ranges)

# https://www.home-assistant.io/integrations/recorder/
recorder:
  # purge_interval: 2
  purge_keep_days: 30
  db_url: !secret db_url
  exclude:
    entities:
      - sun.sun
      - sensor.last_boot
      - sensor.sonarr_wanted

light: !include lights.yaml

zone: !include zones.yaml

switch: !include switches.yaml

# https://github.com/StyraHem/ShellyForHASS/issues/72
# shelly:
#   discovery: true
#   sensors:
#     - all
#   devices:
#     - id: "D0E58B"
#       light_switch: true
#       name: "Gangur shelly"
#     - id: "98f4abac783d7"
#       name: "Vifta"

# TTS is now configured via UI: Settings -> Integrations -> Text-to-speech
# google_translate is available there without YAML config

group: !include groups.yaml
automation: !include_dir_merge_list automations
script: !include_dir_merge_named scripts

homeassistant:
  media_dirs:
    local: /media
  customize: !include customize.yaml
  packages: !include_dir_merge_named packages/

xiaomi_aqara:
  discovery_retry: 5
  gateways:
    - host: 192.168.1.7
      key: !secret aquara_key

sensor: !include sensors.yaml

