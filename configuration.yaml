# Template binary sensors (replaces deprecated binary_sensor: platform: template)
template:
  - binary_sensor:
      - name: “Bílskúr hreyfing”
        device_class: motion
        state: “{{ is_state('group.garage_motion', 'on') }}”
      - name: “Gangur hreyfing”
        device_class: motion
        state: “{{ is_state('group.hallway_motion', 'on') }}”

